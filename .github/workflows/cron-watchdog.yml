name: Cron watchdog — daily.yml

# R40-M (2026-04-27) — Filet de sécurité contre les skips silencieux du
# cron principal.
#
# Contexte : le 27 avril 2026 le cron `0 6 * * *` du workflow daily.yml a
# été silencieusement skippé par GHA (saturation des runners Free à 06:00
# UTC, heure de pic mondial des crons). Cyril n'a pas reçu son mail du
# matin et le site n'a pas été rebuild. R40-M a déjà décalé le cron à
# `42 5 * * *` pour sortir de l'heure pile, mais GHA Free reste imprévisible.
#
# R40-M-ter (2026-04-29) — Le watchdog héritait du bug qu'il était censé
# corriger : il tournait sur `0 9 * * *` (heure pile = pic de saturation),
# et son cutoff `5 hours ago` calculé à 09:00 UTC (= 04:00 UTC) était
# postérieur au cron principal R40-M-bis `42 3 * * *` → faux positifs et
# faux négatifs. Le 29-04 au matin, premier jour avec le nouveau cron
# `42 3`, daily.yml ET watchdog ont tous les deux été silencieusement
# skippés → pas de digest matinal, site figé sur les données du 28-04.
#
# Trois changements R40-M-ter :
#   1. Watchdog du matin déplacé `0 9 * * *` → `17 8 * * *`
#      (10:17 Paris CEST, hors heure pile et hors minute ronde).
#   2. Ajout d'un 2e watchdog l'après-midi `47 11 * * *`
#      (13:47 Paris CEST), filet de récupération si le watchdog du
#      matin saute aussi.
#   3. Cutoff explicite calé sur 03:00 UTC du jour courant (= 30min
#      avant le cron `42 3 * * *` pour absorber une éventuelle avance
#      GHA, exceptionnelle). Plus robuste qu'une fenêtre relative qui
#      doit être ajustée à chaque déplacement du cron principal.
#
# Critère "run récent" :
#   - workflow daily.yml
#   - status terminé OU en cours
#   - created_at >= today 03:00 UTC (couvre le cron `42 3 * * *` +
#     tout run de récupération ou push qui aurait tourné après).
#
# Faux positif possible : si un push manuel a tourné entre 03:00 UTC
# et l'horaire du watchdog, le watchdog considère que le matin est OK
# et ne relance pas daily.yml — comportement souhaité (pas de double
# mail / double rebuild).

on:
  schedule:
    - cron: "17 8 * * *"   # 08:17 UTC = 10:17 Paris CEST (matin)
    - cron: "47 11 * * *"  # 11:47 UTC = 13:47 Paris CEST (après-midi, filet n°2)
  workflow_dispatch:
    inputs:
      force:
        description: "1 = déclencher daily.yml même si un run récent existe"
        required: false
        default: "0"

permissions:
  actions: write  # nécessaire pour POST /actions/workflows/.../dispatches

jobs:
  watchdog:
    runs-on: ubuntu-latest
    steps:
      - name: Vérifie qu'un run daily.yml a tourné depuis 03:00 UTC du jour
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          FORCE: ${{ github.event.inputs.force || '0' }}
        run: |
          set -euo pipefail
          REPO="${{ github.repository }}"
          # Cutoff : aujourd'hui 03:00 UTC. Le cron principal `42 3 * * *`
          # démarre à 03:42 UTC ; on prend 03:00 comme borne basse pour
          # absorber une éventuelle avance GHA (très rare). Tout run de
          # daily.yml dont `created_at` est postérieur est considéré
          # comme couvrant le créneau matin du jour courant.
          CUTOFF="$(date -u +%Y-%m-%dT03:00:00Z)"
          echo "Cutoff watchdog : $CUTOFF (cherche un run daily.yml plus récent)"

          RESP=$(gh api "/repos/$REPO/actions/workflows/daily.yml/runs?per_page=10")
          RECENT_COUNT=$(echo "$RESP" | jq --arg c "$CUTOFF" '
            [.workflow_runs[] | select(.created_at > $c)] | length')
          echo "Runs daily.yml depuis $CUTOFF : $RECENT_COUNT"

          if [ "$RECENT_COUNT" = "0" ] || [ "$FORCE" = "1" ]; then
            echo "→ Déclenchement workflow_dispatch daily.yml (since_days=1)"
            gh api -X POST "/repos/$REPO/actions/workflows/daily.yml/dispatches" \
              -f ref=main \
              -f "inputs[since_days]=1" \
              && echo "OK, dispatch posté"
          else
            echo "→ Cron déjà tiré, watchdog no-op"
          fi
