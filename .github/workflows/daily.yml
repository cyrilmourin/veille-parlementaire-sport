name: Veille parlementaire sport — daily

on:
  schedule:
    # R22f (2026-04-23) : 04:00 Europe/Paris (= 02:00 UTC en été, 03:00 en hiver).
    - cron: "0 2 * * *"
    # R24 (2026-04-23) : ping 17h30 Paris lun-ven (= 15h30 UTC en été).
    # Déclenche python -m src.main ping — email uniquement si nouveautés.
    - cron: "30 15 * * 1-5"
  # R18 (2026-04-22) : auto-deploy à chaque push de code sur main pour que
  # les releases (R17, R18…) n'aient plus besoin d'un lancement manuel via
  # workflow_dispatch. On ignore les chemins qui bouclent (commits du bot
  # `veille-bot` qui push data/last_digest.html + data/*.json à la fin de
  # chaque run) et la doc qui n'impacte pas le site.
  push:
    branches: [main]
    paths-ignore:
      - 'data/**'
      - '**.md'
      - 'docs/**'
      - 'HANDOFF*'
      - 'README*'
  workflow_dispatch:
    inputs:
      since_days:
        description: "Fenêtre digest (jours)"
        required: false
        default: "1"
      no_email:
        description: "Ne pas envoyer l'email (0/1)"
        required: false
        default: "0"
      reset_db:
        description: "Reset SQLite avant run (0/1) — purge l'historique et re-normalise tout"
        required: false
        default: "0"
      reset_category:
        description: "Purge ciblée d'une catégorie avant run (ex. amendements, questions, comptes_rendus) — vide si pas de purge"
        required: false
        default: ""

permissions:
  contents: write
  pages: write
  id-token: write
  # R23-C3 (2026-04-23) : necessaire pour que le step "Purge stale
  # github-pages artifacts" puisse appeler deleteArtifact via l'API
  # GitHub et fixer le bug deploy-pages@v4 sur re-run.
  actions: write

concurrency:
  group: veille-daily
  cancel-in-progress: false

jobs:
  collect-and-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    # R24 (2026-04-23) : ne tourne PAS sur le cron 17h30 (qui est réservé
    # au job ping-afternoon). Tourne sur :
    # - le cron matin "0 2 * * *"
    # - push sur main
    # - workflow_dispatch manuel
    # On filtre via github.event.schedule pour que seul le cron matin
    # déclenche le pipeline complet.
    if: github.event_name != 'schedule' || github.event.schedule == '0 2 * * *'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      # La DB n'est plus trackée en git (>100 Mo). Persistance via cache,
      # avec une clé datée pour créer une nouvelle entrée à chaque run tout
      # en restaurant la plus récente disponible.
      - name: Restore SQLite cache
        if: github.event.inputs.reset_db != '1'
        uses: actions/cache@v4
        with:
          path: data/veille.sqlite3
          key: veille-sqlite-v3-${{ github.run_id }}
          restore-keys: |
            veille-sqlite-v3-

      - name: Reset SQLite (si demandé)
        if: github.event.inputs.reset_db == '1'
        run: |
          echo "reset_db=1 → purge de data/veille.sqlite3 pour re-normaliser l'historique"
          rm -f data/veille.sqlite3

      # Purge ciblée d'une catégorie (ex. amendements) : utile après un patch
      # parser pour forcer la ré-ingestion des items existants. upsert_many()
      # ignore les collisions de hash_key, donc un patch parser ne réécrit
      # pas les items déjà en base sans DELETE préalable.
      - name: Reset catégorie ciblée (si demandé)
        if: github.event.inputs.reset_category != '' && github.event.inputs.reset_db != '1'
        run: |
          echo "reset_category=${{ github.event.inputs.reset_category }} → purge ciblée avant ingest"
          python scripts/reset_category.py "${{ github.event.inputs.reset_category }}" --yes

      # Refresh du cache AMO (acteurs + organes) si absent ou > 7 jours.
      # Le script est idempotent : il skippe s'il trouve un cache frais.
      # Le fichier JSON compact (~100 Ko) est committé à la fin du job pour
      # être disponible en dev local sans refetch du dump 80 Mo.
      # `continue-on-error: true` → si l'AN open data est en panne, on
      # continue avec le cache existant (le pipeline tolère son absence).
      - name: Refresh AMO cache (weekly)
        continue-on-error: true
        run: |
          python -m scripts.refresh_amo_cache --max-age-days 7

      - name: Run pipeline (fetch + match + email + export)
        env:
          # PISTE (Légifrance OAuth2) — non utilisé par défaut, JORF passe via DILA OPENDATA.
          # Décommenter si tu obtiens un accès PISTE et veux doubler les sources.
          # PISTE_CLIENT_ID: ${{ secrets.PISTE_CLIENT_ID }}
          # PISTE_CLIENT_SECRET: ${{ secrets.PISTE_CLIENT_SECRET }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          SMTP_FROM: ${{ secrets.SMTP_FROM }}
          DIGEST_TO: ${{ secrets.DIGEST_TO }}
          SITE_URL: "https://veille.sideline-conseil.fr"
        run: |
          SINCE="${{ github.event.inputs.since_days || '1' }}"
          NOEMAIL=""
          if [ "${{ github.event.inputs.no_email }}" = "1" ]; then NOEMAIL="--no-email"; fi
          python -m src.main run --since "$SINCE" $NOEMAIL -v

      - name: Upload last digest as artifact
        uses: actions/upload-artifact@v4
        with:
          name: digest-${{ github.run_id }}
          path: data/last_digest.html
          if-no-files-found: ignore

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: "0.128.0"
          extended: true

      - name: Build Hugo site
        working-directory: site
        # R22a (2026-04-23) — purge site/public/ AVANT build pour éviter que
        # les pages générées par d'anciennes runs (sources désactivées comme
        # alpes_2030_news ou senat_theme_sport_rss) restent fantômes en ligne.
        # Hugo ne supprime pas les fichiers orphelins par défaut. Option
        # --cleanDestinationDir existe mais n'est efficace que si la dest
        # vient d'être créée ; on fait `rm -rf` en amont par prudence.
        run: |
          rm -rf public
          hugo --minify --baseURL "https://veille.sideline-conseil.fr/"

      # R23-C3 (2026-04-23) — fix bug deploy-pages@v4 sur re-run partiel.
      # Quand "Re-run failed jobs" est cliqué plusieurs fois sur le meme
      # run_id, chaque passage ajoute un artefact "github-pages" sans
      # purger les precedents. A la 2e tentative, deploy-pages echoue avec
      # "Multiple artifacts named github-pages were unexpectedly found for
      # this workflow run. Artifact count is N".
      # On purge les artefacts "github-pages" stales du run courant AVANT
      # l'upload pour rendre le job idempotent sur les re-runs.
      # Ref : https://github.com/actions/deploy-pages/issues/290
      - name: Purge stale github-pages artifacts from this run
        uses: actions/github-script@v7
        with:
          script: |
            const { data: { artifacts } } = await github.rest.actions.listWorkflowRunArtifacts({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: context.runId,
              per_page: 100,
            });
            const stale = artifacts.filter(a => a.name === 'github-pages');
            if (stale.length === 0) {
              console.log('No stale github-pages artifact to purge.');
              return;
            }
            console.log(`Found ${stale.length} stale github-pages artifact(s), deleting...`);
            for (const a of stale) {
              console.log(`  - deleting artifact id=${a.id} size=${a.size_in_bytes}`);
              await github.rest.actions.deleteArtifact({
                owner: context.repo.owner,
                repo: context.repo.repo,
                artifact_id: a.id,
              });
            }

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      # Commit du dernier digest HTML (~300 Ko) + cache AMO acteurs/organes
      # (~100 Ko) + cache texte→dossier AN (~500 Ko) si régénérés. La DB
      # SQLite reste persistée via actions/cache (>100 Mo).
      #
      # Rationale an_texte_to_dossier.json (2026-04-21, R13-F) : mapping
      # texteLegislatifRef → dossier_title consommé par _normalize_amendement
      # pour enrichir le haystack du matcher (R11b). normalize.run_all
      # parallélise dosleg + amendements via ThreadPoolExecutor(max_workers=6)
      # + as_completed → sans pré-chargement, race au premier run après
      # reset_db (amendements lus avant que dosleg ait écrit le cache). On
      # persiste entre runs comme les autres caches.
      - name: Commit last digest + AMO + texte→dossier caches
        if: always()
        run: |
          git config user.name "veille-bot"
          git config user.email "veille-bot@sideline-conseil.fr"
          git add data/last_digest.html data/amo_resolved.json data/an_texte_to_dossier.json data/ping_state.json 2>/dev/null || true
          git diff --cached --quiet || git commit -m "chore: snapshot digest $(date -u +%Y-%m-%dT%H:%MZ)"
          git push || true

  # ── Job ping 17h30 ─────────────────────────────────────────────────────────
  # R24 (2026-04-23) : s'exécute uniquement sur le cron 15h30 UTC (lun-ven).
  # Lit la DB depuis le cache, compare avec ping_state.json du matin,
  # envoie un email court si nouveautés dans les 4 catégories prioritaires.
  ping-afternoon:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # Ne tourne que sur le cron 17h30, pas sur push ni workflow_dispatch
    if: github.event_name == 'schedule' && github.event.schedule == '30 15 * * 1-5'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -e .

      - name: Restore SQLite cache (read-only)
        uses: actions/cache@v4
        with:
          path: data/veille.sqlite3
          key: veille-sqlite-v3-never-match
          restore-keys: |
            veille-sqlite-v3-

      - name: Run ping
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          SMTP_FROM: ${{ secrets.SMTP_FROM }}
          DIGEST_TO: ${{ secrets.DIGEST_TO }}
          SITE_URL: "https://veille.sideline-conseil.fr"
        run: python -m src.main ping -v

      # Commit du ping_state.json si modifié (les nouveaux UIDs notifiés
      # sont mergés dans pinged_uids). Sans ça, un redémarrage du job
      # re-notifierait les mêmes items.
      - name: Commit ping_state.json if changed
        if: always()
        run: |
          git config user.name "veille-bot"
          git config user.email "veille-bot@sideline-conseil.fr"
          git add data/ping_state.json 2>/dev/null || true
          git diff --cached --quiet || git commit -m "chore: ping_state $(date -u +%Y-%m-%dT%H:%MZ)"
          git push || true
