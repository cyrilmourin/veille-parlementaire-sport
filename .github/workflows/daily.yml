name: Veille parlementaire sport — daily

on:
  schedule:
    # 08:00 Europe/Paris (= 06:00 UTC en été, 07:00 en hiver — on planifie à 06:00 UTC)
    - cron: "0 6 * * *"
  workflow_dispatch:
    inputs:
      since_days:
        description: "Fenêtre digest (jours)"
        required: false
        default: "1"
      no_email:
        description: "Ne pas envoyer l'email (0/1)"
        required: false
        default: "0"
      reset_db:
        description: "Reset SQLite avant run (0/1) — purge l'historique et re-normalise tout"
        required: false
        default: "0"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: veille-daily
  cancel-in-progress: false

jobs:
  collect-and-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      # La DB n'est plus trackée en git (>100 Mo). Persistance via cache,
      # avec une clé datée pour créer une nouvelle entrée à chaque run tout
      # en restaurant la plus récente disponible.
      - name: Restore SQLite cache
        if: github.event.inputs.reset_db != '1'
        uses: actions/cache@v4
        with:
          path: data/veille.sqlite3
          key: veille-sqlite-v3-${{ github.run_id }}
          restore-keys: |
            veille-sqlite-v3-

      - name: Reset SQLite (si demandé)
        if: github.event.inputs.reset_db == '1'
        run: |
          echo "reset_db=1 → purge de data/veille.sqlite3 pour re-normaliser l'historique"
          rm -f data/veille.sqlite3

      - name: Run pipeline (fetch + match + email + export)
        env:
          # PISTE (Légifrance OAuth2) — non utilisé par défaut, JORF passe via DILA OPENDATA.
          # Décommenter si tu obtiens un accès PISTE et veux doubler les sources.
          # PISTE_CLIENT_ID: ${{ secrets.PISTE_CLIENT_ID }}
          # PISTE_CLIENT_SECRET: ${{ secrets.PISTE_CLIENT_SECRET }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          SMTP_FROM: ${{ secrets.SMTP_FROM }}
          DIGEST_TO: ${{ secrets.DIGEST_TO }}
          SITE_URL: "https://veille.sideline-conseil.fr"
        run: |
          SINCE="${{ github.event.inputs.since_days || '1' }}"
          NOEMAIL=""
          if [ "${{ github.event.inputs.no_email }}" = "1" ]; then NOEMAIL="--no-email"; fi
          python -m src.main run --since "$SINCE" $NOEMAIL -v

      - name: Upload last digest as artifact
        uses: actions/upload-artifact@v4
        with:
          name: digest-${{ github.run_id }}
          path: data/last_digest.html
          if-no-files-found: ignore

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: "0.128.0"
          extended: true

      - name: Build Hugo site
        working-directory: site
        run: hugo --minify --baseURL "https://veille.sideline-conseil.fr/"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      # Commit uniquement le dernier digest HTML (lisible, ~300 Ko).
      # La DB SQLite est persistée via actions/cache (>100 Mo, donc pas dans git).
      - name: Commit last digest
        if: always()
        run: |
          git config user.name "veille-bot"
          git config user.email "veille-bot@sideline-conseil.fr"
          git add data/last_digest.html || true
          git diff --cached --quiet || git commit -m "chore: snapshot digest $(date -u +%Y-%m-%dT%H:%MZ)"
          git push || true
