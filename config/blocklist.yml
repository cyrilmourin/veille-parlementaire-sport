# Liste rouge — items à masquer du site (filtre à l'export, pas de purge DB).
#
# Usage : ajouter une entrée { uid: ..., reason: ... } (recommandé) ou
# { url: ..., reason: ... } pour exclure un item spécifique — typiquement
# un faux positif keyword qu'on ne veut pas faire disparaître via une
# réécriture du dictionnaire keywords (celle-ci élargirait le retrait à
# d'autres items légitimes).
#
# Comment ça marche :
#   - Le filtre `_filter_blocklist` dans `src/site_export.py` est appliqué à
#     l'export, juste après `_filter_disabled_sources` (R22b).
#   - L'item reste en DB et continue d'être ingéré au prochain run — donc
#     retirer une entrée de cette liste le fait réapparaître au build suivant
#     sans reset_db ni reset_category. Symétrique à `_filter_disabled_sources`.
#   - Match par UID exact (`source_id::uid`) OU par URL canonicalisée
#     (strip scheme + lowercase + retrait trailing slash + retrait fragment).
#
# ⚠ FORMAT URL — IMPORTANT (R40-D, 2026-04-26) :
# L'URL doit être EXACTEMENT celle stockée par le pipeline en DB. Pour les
# amendements AN, le pipeline stocke la forme TECHNIQUE :
#
#     https://www.assemblee-nationale.fr/dyn/17/amendements/<UID_TECHNIQUE>
#     ex. https://www.assemblee-nationale.fr/dyn/17/amendements/AMANR5L17PO419865B2632P0D1N000495
#
# PAS la forme navigable visible dans le navigateur :
#
#     https://www.assemblee-nationale.fr/dyn/17/amendements/<TEXTE>/CION-<XXX>/<CD<NUM>>
#     ex. https://www.assemblee-nationale.fr/dyn/17/amendements/2632/CION-DVP/CD495   ❌ JAMAIS MATCHÉ
#
# Pour récupérer l'UID technique d'un amendement, ouvrir la page navigable
# AN, cliquer sur le lien « XML » ou « JSON » en haut, et copier la chaîne
# AMANR5L17… affichée dans l'URL. Recommandation : préférer la forme `uid:`
# qui est plus lisible et insensible aux changements de domaine côté AN.
#
# Convention :
#   - `uid: an_amendements::AMANR5L17…` recommandé pour les amendements AN
#     (UID technique stable, indépendant de l'URL de fetch).
#   - `url: https://…` pour les sources où l'UID est moins lisible
#     (questions, dossiers, JORF) — vérifier le format réel via la DB ou
#     l'export `_index.md` Hugo de la catégorie.
#   - Toujours documenter la raison dans `reason` — utile à la relecture
#     dans 6 mois pour décider si l'entrée est encore pertinente.
#
# Garde-fou : `reason` libre mais court (<200 chars). Pas de PII ni d'info
# sensible — ce fichier est versionné en clair sur GitHub public.

blocklist:
  # 2026-04-26 (R40-D) — PJL n°2632 « urgence pour la protection et la
  # souveraineté agricoles » (texte 2632 en commission DVP, organe
  # PO419865). Ces deux amendements signés Manon Meunier (LFI-NFP)
  # matchent le keyword « football » via une métaphore de l'exposé des
  # motifs (« 5 terrains de football par heure » pour quantifier
  # l'artificialisation des sols) mais n'ont aucun lien avec la veille
  # sport-institutionnel : faux positif à exclure ponctuellement plutôt
  # qu'en retirant « football » du dictionnaire keywords (qui ferait
  # disparaître les vrais items football/FFF/LFP).
  #
  # Format `uid:` (recommandé R40-D) plutôt que `url:` — la version R39-O
  # initiale utilisait l'URL navigable `…/2632/CION-DVP/CD495` qui n'était
  # JAMAIS matchée parce que le pipeline stocke la forme technique
  # `…/amendements/<UID_TECHNIQUE>`. Voir l'avertissement en tête de fichier.
  - uid: an_amendements::AMANR5L17PO419865B2632P0D1N000495
    reason: "Faux positif keyword football sur PJL agricoles n°2632 (métaphore terrain de football)"
  - uid: an_amendements::AMANR5L17PO419865B2632P0D1N000492
    reason: "Faux positif keyword football sur PJL agricoles n°2632 (métaphore terrain de football)"

