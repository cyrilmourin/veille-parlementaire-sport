# Dictionnaire de mots-clés — veille sport Sideline Conseil
# Matching insensible à la casse et aux accents (voir src/keywords.py).
# Chaque terme peut contenir des espaces et des chiffres. Les variantes orthographiques
# sont listées explicitement (on ne fait pas de stemming — on préfère la précision).
# Famille : acteur | dispositif | evenement | federation | theme
#
# R13-B (2026-04-21) : 1re lettre capitalisée pour affichage propre (badge,
# digest, home). Les sigles tout-majuscule (CNOSF, AFLD, CIO, FFF…) et les
# termes déjà capitalisés (Tony Estanguet, Paris 2024) sont préservés tels
# quels. Le matching côté `src/keywords.py` normalise via unidecode+lower,
# donc la casse du terme en config n'affecte que le rendu.

