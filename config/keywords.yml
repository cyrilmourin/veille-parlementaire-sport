# R41-A (2026-04-27) — Famille `nomination_event` : expressions
# performatives multi-mots qui combinent un verbe d'acte (élu, nommé,
# prend la tête…) ET une fonction stratégique. Volontairement
# expressives pour éviter les faux positifs descriptifs type "le
# nouveau président de la FFR s'est rendu à…" (qui matcherait
# « nouveau président » seul s'il était dans le dictionnaire).
#
# Cette famille déclenche un re-route automatique de la catégorie de
# l'item de `communiques` → `nominations` à l'export (cf.
# site_export._reroute_to_nominations). Volume attendu très faible
# (10-30 items / 6 mois), donc on peut ajouter ponctuellement à la
# blocklist les rares faux positifs.
#
# Volontairement EXCLUS : "nouveau président", "nouvelle présidente",
# "actuel président", "depuis sa nomination", "fraîchement élu" —
# usages descriptifs sans acte de nomination.
