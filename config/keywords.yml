  # ========================================================================
  # R42-J (2026-05-10) — Patterns « devient + fonction » / « nouveau +
  # fonction » / « est devenu(e) + fonction » courants en presse business
  # (Olbia, Café du Sport Business, Sport Stratégies, etc.). Ces formules
  # remplacent souvent « nommé/élu » dans le langage journalistique :
  # « X devient président de la FFR », « Y est la nouvelle directrice du
  # sport ». Audit 2026-05-10 : sur 16 newsletters Olbia dans la fenêtre
  # 90j, seules 2 matchaient (« nommé président OM », « élue présidente
  # FF montagne ») — les 14 autres utilisaient « devient/rejoint/nouveau »
  # non couverts. CRITIQUE : toujours combiner « devient » avec une
  # fonction stratégique pour éviter les faux positifs (« le sport devient
  # une priorité du gouvernement »). On ne liste JAMAIS « devient » seul.
  # ========================================================================

  # — devient + fonction (masc.)
  - devient président
  - devient president
  - devient président-directeur général
  - devient president-directeur general
  - devient pdg
  - devient directeur général
  - devient directeur general
