      impersonate: true
      chamber: MinEcon
      title_prefix: "MinEcon —"
      fetch_meta: true
      fetch_meta_limit: 40

    - id: min_justice
      category: communiques
      # R18 (2026-04-22) — Ajout `impersonate: true` : le site passe déjà en
      # 200 OK sur httpx standard la plupart du temps mais le challenge CF
