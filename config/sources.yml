# Inventaire des sources — veille parlementaire sport
# Validé en live sur data.assemblee-nationale.fr, data.senat.fr et les portails officiels
# en avril 2026. À auditer régulièrement via scripts/audit_sources.py.

# Catégories Follaw.sv :
#   dossiers_legislatifs | jorf | amendements | questions | comptes_rendus
#   publications        | nominations | agenda | communiques

assemblee_nationale:
  base: https://data.assemblee-nationale.fr/static/openData/repository/17
  sources:
    - id: an_dossiers_legislatifs
      category: dossiers_legislatifs
      url: https://data.assemblee-nationale.fr/static/openData/repository/17/loi/dossiers_legislatifs/Dossiers_Legislatifs.json.zip
      format: json_zip

    - id: an_amendements
      category: amendements
      # Path live AN opendata : /loi/amendements_div_legis/Amendements.json.zip
      # (vérifié 2026-04-20 : HTTP 200, 254 Mo, last-modified du jour —
      #  le path /loi/amendements_legis/Amendements.json.zip renvoie 404,
      #  cause du an_amendements=0 observé depuis R11).
      url: https://data.assemblee-nationale.fr/static/openData/repository/17/loi/amendements_div_legis/Amendements.json.zip
      format: json_zip
      since_days: 30      # fenêtre (sinon 104k amendements rechargés à chaque run)

    - id: an_questions_ecrites
      category: questions
      url: https://data.assemblee-nationale.fr/static/openData/repository/17/questions/questions_ecrites/Questions_ecrites.json.zip
      format: json_zip
      since_days: 30

    - id: an_questions_gouvernement
      category: questions
      url: https://data.assemblee-nationale.fr/static/openData/repository/17/questions/questions_gouvernement/Questions_gouvernement.json.zip
      format: json_zip
      since_days: 30

    - id: an_questions_orales_sans_debat
      category: questions
      url: https://data.assemblee-nationale.fr/static/openData/repository/17/questions/questions_orales_sans_debat/Questions_orales_sans_debat.json.zip
      format: json_zip
      since_days: 30

    - id: an_agenda
      category: agenda
      url: https://data.assemblee-nationale.fr/static/openData/repository/17/vp/reunions/Agenda.json.zip
      format: json_zip
      # R13-L (2026-04-21) : 90j → 30j aligné sur WINDOW_DAYS_BY_CATEGORY
      # agenda (Cyril veut 30 derniers jours + futurs seulement).
      since_days: 30

    # NB : pas de dump "Reunions.json.zip" séparé — la page
    # /reunions/reunions ne pointe que vers Agenda.json.zip, qui couvre
    # déjà toutes les réunions.

    # Syceron brut = comptes rendus intégraux de séance publique.
    # URL récupérée via la page /travaux-parlementaires/debats.
    # ATTENTION : le nom du fichier est "syseron" (avec un S) et pas
    # "syceron" (avec un C) — typo historique dans le nommage AN.
    - id: an_syceron
      category: comptes_rendus
      url: https://data.assemblee-nationale.fr/static/openData/repository/17/vp/syceronbrut/syseron.xml.zip
      format: xml_zip
      since_days: 30

    # R28 (2026-04-23) — Rapports parlementaires AN. Les rapports sont
    # inclus dans le dump `Dossiers_Legislatifs.json.zip` mais noyés parmi
    # toutes les étapes de procédure (PPL/PJL, textes adoptés, avis,
    # commissions). Pour alimenter un flux « rapports AN » dédié (symétrie
    # avec `senat_rapports`), on scrape la page publique de listing :
    #   https://www2.assemblee-nationale.fr/documents/liste?type=rapports&legis=17
    # Page server-rendered, ~100 rapports les plus récents, avec pour
    # chaque entrée `data-id="OMC_RAPPANR5L17BXXXX"`, titre, date
    # (« Mis en ligne … »), lien dossier législatif + PDF. Le handler
    # `assemblee_rapports.fetch_source` filtre les entrées `OMC_RAPP`
    # (ignore PRJL/PION/AVIS) et privilégie l'URL du dossier législatif.
    - id: an_rapports
      category: communiques
      url: https://www2.assemblee-nationale.fr/documents/liste?type=rapports&legis=17
      format: an_rapports_html

    # R35-B (2026-04-24) — Comptes rendus de commissions AN.
    # L'agenda AN (`an_agenda`) expose les réunions de commission mais pas
    # leur corps — le compte rendu (PDF) est publié après la réunion sur
    # une URL dépendante du numéro séquentiel dans la session, qui n'est
    # pas dans le dump agenda. On itère par force brute par commission,
    # état persisté dans data/an_cr_state.json (delta court aux runs
    # suivants). Le handler `an_cr_commissions.fetch_source` extrait le
    # texte du PDF via pypdf et le pose dans haystack_body pour que le
    # matcher mots-clés l'exploite (R26).
    # Cas déclencheur : cion-cedu réunion 58 (2026-04-22), « Table ronde
    # sur la gouvernance des autres sports que le football » — non matché
    # par le titre agenda seul.
    - id: an_cr_commissions
      category: comptes_rendus
      url: https://www.assemblee-nationale.fr/dyn/17/comptes-rendus/
      format: an_cr_commissions
      max_new_per_run: 10
      miss_tolerance: 3
      max_num: 99

senat:
  sources:
    # ----- Dossiers législatifs : flux Akoma Ntoso (titre + statut + date)
    # depots.xml liste les textes déposés au Sénat (primo-dépôt, transmis,
    # texte de commission) ; adoptions.xml liste les textes adoptés en
    # séance. Chaque entrée pointe vers un .akn.xml unitaire contenant le
    # workflow complet (procédure parlementaire). Doc DSI Sénat (mars 2021).
    - id: senat_akn_depots
      category: dossiers_legislatifs
      url: https://www.senat.fr/akomantoso/depots.xml
      format: akn_index
      since_days: 90       # ne fetch que les textes modifiés < 3 mois

    - id: senat_akn_adoptions
      category: dossiers_legislatifs
      url: https://www.senat.fr/akomantoso/adoptions.xml
      format: akn_index
      since_days: 90

    # ----- Dossiers législatifs : flux CSV legacy (conservés en backup)
    # Le CSV ne fournit pas de date ni de statut de procédure : ces sources
    # complètent le flux AKN sur les dossiers anciens, mais le titre / la
    # date ne sont pas garantis.
    # senat_dosleg : R11g-1 avait désactivé ce flux parce que le .zip
    # était vide. R39-A (2026-04-25, import audit Lidl) réactive avec la
    # bonne URL : le Sénat expose désormais un CSV direct stable
    # `dossiers-legislatifs.csv` (360 Ko, HTTP 200 confirmé en live).
    # Complément de `senat_akn_depots/adoptions` (Akoma Ntoso) qui couvre
    # les textes récents ; ce flux CSV ramène l'historique complet des
    # dossiers Sénat (filtre par fenêtre côté site_export).
    - id: senat_dosleg
      category: dossiers_legislatifs
      url: https://data.senat.fr/data/dosleg/dossiers-legislatifs.csv
      format: csv

    - id: senat_ppl
      category: dossiers_legislatifs
      url: https://data.senat.fr/data/dosleg/ppl.csv
      format: csv

    - id: senat_rapports
      category: communiques
      url: https://data.senat.fr/data/dosleg/rapports.csv
      format: csv

    - id: senat_promulguees
      category: dossiers_legislatifs
      url: https://data.senat.fr/data/dosleg/promulguees.csv
      format: csv

    # senat_ameli.zip = dump PostgreSQL plain (un seul fichier
    # var/opt/opendata/ameli.sql de 149 Mo), pas un zip de CSV. Le loader
    # csv_zip filtre sur .csv ligne 133 → 0 item systémique depuis des
    # mois. Remplacé par `senat_amendements` ci-dessous qui itère les
    # textes récents et fetche les CSV unitaires `jeu_complet_*.csv`
    # exposés par le Sénat (doc officielle data.senat.fr/ameli/).
    # Conservé en config (enabled: false) pour mémoire.
    - id: senat_ameli
      category: amendements
      url: https://data.senat.fr/data/ameli/ameli.zip
      format: csv_zip
      enabled: false

    # Amendements per-texte : itère depots.xml + adoptions.xml pour
    # récupérer session+num, puis fetche les CSV jeu_complet séance +
    # commission exposés en temps réel. Enrichit chaque amendement avec
    # le titre du dossier parent (logique R11b côté Sénat) pour que le
    # matcher retombe sur le thème même quand l'amendement lui-même ne
    # cite pas les mots-clés littéralement.
    - id: senat_amendements
      category: amendements
      url: https://www.senat.fr/akomantoso/depots.xml
      format: akn_discussion
      since_days: 90

    # senat_questions : DÉSACTIVÉ en R11g-1 (2026-04-21).
    # Produit 0 item depuis longtemps (doublon historique de
    # `senat_questions_1an` qui couvre la fenêtre glissante 1 an sur CSV).
    # Le zip complet questions.zip n'expose plus de CSV exploitable.
    - id: senat_questions
      category: questions
      url: https://data.senat.fr/data/questions/questions.zip
      format: csv_zip
      enabled: false

    - id: senat_qg
      category: questions
      url: https://data.senat.fr/data/questions/qg.csv
      format: csv

    - id: senat_questions_1an
      category: questions
      url: https://data.senat.fr/data/questions/questions-depuis-un-an.csv
      format: csv

    - id: senat_debats
      category: comptes_rendus
      url: https://data.senat.fr/data/debats/debats.zip
      format: csv_zip

    - id: senat_cri
      category: comptes_rendus
      url: https://data.senat.fr/data/debats/cri.zip
      format: csv_zip

    - id: senat_rss
      category: communiques
      url: https://data.senat.fr/feed/actualites-rss.xml
      format: rss

    # R15 (2026-04-22) — scraper dédié agenda Sénat. Remplace l'ancien
    # format `html` qui tombait sur la SPA AngularJS (0 item). Itère la
    # fenêtre J-7 → J+30 et fetche la vue imprimable quotidienne
    # `/agenda/Global/agl{DDMMYYYY}Print.html` qui agrège toutes les
    # sections (1 requête / jour au lieu de 7).
    #
    # R16 (2026-04-22) — DÉSACTIVÉ. Diagnostic confirmé :
    #   - `/agenda/` → HTTP 403 "Accès restreint" (WAF Sénat bloque tous
    #     les UA scrapers, y compris UA Chrome complet).
    #   - `/agenda/Global/aglDDMMYYYYPrint.html` → HTTP 404 "Page
    #     introuvable" (URL inexistante côté serveur, pas juste restreinte).
    #   - Aucun endpoint JSON/iCal agenda public identifié.
    # Réactivation nécessiterait soit un contournement WAF (Playwright +
    # stealth), soit un accord avec la DSI Sénat. Compensation partielle :
    # `senat_theme_sport_rss` (ci-dessous) remonte les textes législatifs
    # / rapports / avis thème "Sports" (non agenda mais même écosystème).
    - id: senat_agenda
      category: agenda
      url: https://www.senat.fr/agenda/
      format: senat_agenda_daily
      before_days: 7
      after_days: 30
      printable: true
      enabled: false

    # R35-E (2026-04-24) — Agenda HTML de la commission culture/éducation/
    # communication/sport (Sénat). Alternative au senat_agenda_daily
    # bloqué par WAF : chaque commission expose sa propre page
    # `agenda-de-la-commission.html` qui répond en HTTP 200 normal et
    # liste les "Prochaines réunions" (date + titre + salle + heure).
    # R40-B (2026-04-26) : élargi à 3 autres commissions permanentes
    # (lois, finances, affaires étrangères) — décrites ci-dessous.
    # Affaires sociales reste exclue (R35-D, >90% off-topic).
    - id: senat_agenda_culture
      category: agenda
      url: https://www.senat.fr/travaux-parlementaires/commissions/commission-de-la-culture-de-leducation-et-de-la-communication/agenda-de-la-commission.html
      format: senat_commission_agenda_html
      commission_label: Commission culture/éducation/communication/sport
      commission_organe: PO211490

    # R40-B (2026-04-26) — Agenda Commission des lois Sénat (PO211495).
    # Recoupe sport sur : éthique/dopage, intégrité du sport pro, lutte
    # contre les violences/discriminations dans le sport, encadrement
    # des supporters, voile sportif. Slug agenda non standard
    # (`agenda-de-la-commission-1.html` au lieu de `agenda-de-la-commission.html`).
    # Le bypass organe R27 étant désactivé (R39-K), seuls les agendas
    # avec match keyword métier remonteront — pas de risque de bruit.
    - id: senat_agenda_lois
      category: agenda
      url: https://www.senat.fr/travaux-parlementaires/commissions/commission-des-lois/agenda-de-la-commission-1.html
      format: senat_commission_agenda_html
      commission_label: Commission des lois Sénat
      commission_organe: PO211495

    # R40-B (2026-04-26) — Agenda Commission des finances Sénat (PO211494).
    # Recoupe sport sur : budget MinSports, financement ANS, fiscalité
    # sport pro/amateur, marché des paris sportifs. Slug standard.
    - id: senat_agenda_finances
      category: agenda
      url: https://www.senat.fr/travaux-parlementaires/commissions/commission-des-finances/agenda-de-la-commission.html
      format: senat_commission_agenda_html
      commission_label: Commission des finances Sénat
      commission_organe: PO211494

    # R40-B (2026-04-26) — Agenda Commission affaires étrangères, défense
    # et forces armées Sénat (PO211491). Recoupe sport sur : JO/JP comme
    # outil diplomatique, accueil de grands événements (Coupe du monde
    # rugby, JOP 2030), sport militaire, géopolitique sportive. Slug
    # agenda non standard (`agenda-de-la-commission-des-affaires-etrangeres.html`).
    - id: senat_agenda_etrangeres
      category: agenda
      url: https://www.senat.fr/travaux-parlementaires/commissions/commission-des-affaires-etrangeres-de-la-defense-et-des-forces-armees/agenda-de-la-commission-des-affaires-etrangeres.html
      format: senat_commission_agenda_html
      commission_label: Commission affaires étrangères Sénat
      commission_organe: PO211491

    # R40-E (2026-04-26) — Agenda Commission affaires sociales Sénat
    # (PO211493). R35-D avait sorti cette commission du bypass organe R27
    # parce qu'elle générait >90 % de bruit off-topic (retraites, sécu,
    # droit du travail, assurance maladie). MAIS R39-K (2026-04-25) a
    # complètement désactivé le bypass organe R27 — désormais SEUL le
    # matching keyword métier décide ce qui remonte. Donc inclure
    # affaires sociales ne crée plus de bruit : seules les rares réunions
    # genuinement sport (santé sportive, dopage médical, retraites athlètes
    # de haut niveau, sport sur ordonnance) remonteront via match keyword.
    - id: senat_agenda_affaires_sociales
      category: agenda
      url: https://www.senat.fr/travaux-parlementaires/commissions/commission-des-affaires-sociales/agenda-de-la-commission.html
      format: senat_commission_agenda_html
      commission_label: Commission affaires sociales Sénat
      commission_organe: PO211493

    # R37-A (2026-04-24) — Comptes rendus hebdomadaires commission culture
    # Sénat. Le Sénat ne publie pas de dump JSON/XML pour les CR de
    # commissions : on scrape le listing /compte-rendu-commissions/culture.html
    # qui liste les bulletins hebdomadaires (h3 avec liens vers
    # /compte-rendu-commissions/YYYYMMDD/cult.html). Chaque CR hebdo agrège
    # toutes les réunions de la commission sur la semaine. Le contenu HTML
    # complet alimente `raw.haystack_body` pour que le matcher mots-clés
    # le scanne.
    # R40-C (2026-04-26) : élargi à 3 autres commissions permanentes Sénat
    # (lois, finances, affaires étrangères) — symétrie exacte avec R40-B
    # côté agenda. Affaires sociales reste exclue (R35-D, >90% bruit).
    - id: senat_cr_culture
      category: comptes_rendus
      url: https://www.senat.fr/compte-rendu-commissions/culture.html
      format: senat_cr_commissions_html
      commission_label: Commission culture/éducation/communication/sport
      commission_organe: PO211490
      max_new_per_run: 8
      body_max_chars: 200000

    # R40-C (2026-04-26) — CR hebdo Commission des lois Sénat. Slug
    # listing court `lois.html`. Les CR commission contiennent souvent
    # des sujets sport (éthique/dopage, intégrité sport pro, voile
    # sportif). Bypass organe R27 désactivé depuis R39-K → seuls les
    # CR avec match keyword métier remontent.
    - id: senat_cr_lois
      category: comptes_rendus
      url: https://www.senat.fr/compte-rendu-commissions/lois.html
      format: senat_cr_commissions_html
      commission_label: Commission des lois Sénat
      commission_organe: PO211495
      max_new_per_run: 8
      body_max_chars: 200000

    # R40-C (2026-04-26) — CR hebdo Commission des finances Sénat. Slug
    # listing `finances.html`. Sujets sport courants : budget MinSports,
    # financement ANS, fiscalité sport, paris sportifs.
    - id: senat_cr_finances
      category: comptes_rendus
      url: https://www.senat.fr/compte-rendu-commissions/finances.html
      format: senat_cr_commissions_html
      commission_label: Commission des finances Sénat
      commission_organe: PO211494
      max_new_per_run: 8
      body_max_chars: 200000

    # R40-C (2026-04-26) — CR hebdo Commission affaires étrangères, défense
    # et forces armées Sénat. Slug listing `affaires-etrangeres.html`.
    # Sujets sport : JO/JP comme outil diplomatique, géopolitique
    # sportive, sport militaire, accueil grands événements.
    - id: senat_cr_etrangeres
      category: comptes_rendus
      url: https://www.senat.fr/compte-rendu-commissions/affaires-etrangeres.html
      format: senat_cr_commissions_html
      commission_label: Commission affaires étrangères Sénat
      commission_organe: PO211491
      max_new_per_run: 8
      body_max_chars: 200000

    # R40-E (2026-04-26) — CR hebdo Commission affaires sociales Sénat
    # (PO211493). Symétrique avec senat_agenda_affaires_sociales : R39-K
    # a désactivé le bypass organe R27, donc l'argument R35-D (>90 %
    # off-topic) ne tient plus pour cette source. Seuls les CR avec
    # match keyword sport remontent. Slug listing `affaires-sociales.html`.
    - id: senat_cr_affaires_sociales
      category: comptes_rendus
      url: https://www.senat.fr/compte-rendu-commissions/affaires-sociales.html
      format: senat_cr_commissions_html
      commission_label: Commission affaires sociales Sénat
      commission_organe: PO211493
      max_new_per_run: 8
      body_max_chars: 200000

    # R16 (2026-04-22) — Flux RSS Sénat thème "Sports" (N=31).
    # R19-B (2026-04-23) : DÉSACTIVÉ. Ce flux remontait des documents
    # INTERNES à un dossier législatif (rapports, avis, textes adoptés,
    # textes de commission à plusieurs lectures) et produisait jusqu'à
    # 8 doublons pour la même loi (JOP Alpes 2030 → pjl24-630 initial +
    # pjl24-734 com. + pjl25-278 transmis + pjl25-307 com. 2e L +
    # tas25-051 adopté + rap/l25-306 + rap/a24-711..720 + notice).
    # Les VRAIS dossiers sont déjà captés par senat_akn_depots,
    # senat_akn_adoptions et senat_promulguees avec l'URL canonique
    # /dossier-legislatif/pjlXX-YYY.html. Ce RSS n'ajoute que du bruit.
    - id: senat_theme_sport_rss
      category: dossiers_legislatifs
      url: https://www.senat.fr/themes/rss/therss31.xml
      format: rss
      enabled: false

# Journal officiel (JORF) — dump DILA OPENDATA (aucun credential nécessaire).
# L'API PISTE/Légifrance est contournée : le dump XML quotidien DILA contient
# les mêmes textes et est accessible sans authentification.
# Doc : https://echanges.dila.gouv.fr/OPENDATA/JORF/
dila:
  sources:
    - id: dila_jorf
      category: jorf
      url: https://echanges.dila.gouv.fr/OPENDATA/JORF/
      format: dila_jorf
      # Nombre d'éditions à ingérer. DILA publie ~2 éditions par jour (matin
      # ~00h30 + soir ~21h), donc 16 ≈ 8 jours de couverture.
      days_back: 16

# Exécutif — flux RSS quand disponibles, sinon scraping structuré
executif:
  sources:
    # R16 (2026-04-22) — L'ancien `elysee_sitemap` utilisait
    # /sitemap.static.xml : 200 OK mais ne contient que 10 URLs de
    # navigation (home, lettre-information, agenda, les-dossiers,
    # recherche, etc.) — aucune publication. Les 5 autres sitemaps
    # (publication, sp, dossier, space, president) exposent 15000+ URLs
    # historiques mais sans `<lastmod>` réel (tous datés 2026-03-18,
    # jour de la refonte) → impossible de filtrer par récence.
    # Solution : flux RSS officiel `/feed` (34 Ko, items récents, vrai
    # pubDate). Limité à ~10 derniers items mais c'est le bon flux
    # canonique pour l'actualité.
    - id: elysee_feed
      category: communiques
      url: https://www.elysee.fr/feed
      format: rss

    # R16 (2026-04-22) — Agenda Élysée. Le scraping HTML générique ne
    # trouvait pas la grille d'événements (0 items R15). Le handler dédié
    # `elysee_agenda_html` connaît la structure : <li class="newsBlock-
    # grid-item"> / <a class="newsBlock-grid-link"> avec date FR en texte
    # et titre dans <span>.
    - id: elysee_agenda
      category: agenda
      url: https://www.elysee.fr/agenda
      format: elysee_agenda_html

    # R18 (2026-04-22) — Cloudflare challenge JS débloqué via curl_cffi
    # (TLS fingerprint Chrome120 dans _common._fetch_bytes_impersonate).
    # Les URLs /actualite de gouvernement.fr redirigent toutes vers
    # info.gouv.fr (fusion 2024). On consolide sur le domaine cible.
    # Historique : cf. R15/R16 (enabled: false) — levée par `impersonate: true`.
    - id: info_gouv_actualites
      category: communiques
      url: https://www.info.gouv.fr/toute-l-actualite
      format: html
      impersonate: true
      # R22e-2 (2026-04-23) : enrichissement meta description (opt-in).
      fetch_meta: true
      fetch_meta_limit: 40

    # info.gouv — section spécifique PM (Premier Ministre).
    - id: matignon_actualites
      category: communiques
      url: https://www.info.gouv.fr/suivre-l-actualite-du-premier-ministre
      format: html
      impersonate: true
      chamber: Matignon
      title_prefix: "PM —"
      fetch_meta: true
      fetch_meta_limit: 40

    # R15 (2026-04-22) — Agenda public du ministre de l'Éducation
    # nationale. Dataset data.gouv.fr `fr-en-agenda-ministre-education-
    # nationale` via portail OpenDataSoft data.education.gouv.fr.
    # Schéma {uid, dtstart, dtend, description} — PAS de summary ni
    # agenda (le handler `data_gouv_agenda` utilise `description`
    # comme contenu principal en fallback).
    # Vérifié live 2026-04-22 : 126 events 2026, last_modified 2026-04-21.
    # Contournement propre du blocage Cloudflare sur education.gouv.fr.
    - id: min_educ_agenda
      category: agenda
      url: https://data.education.gouv.fr/api/explore/v2.1/catalog/datasets/fr-en-agenda-ministre-education-nationale/exports/json
      format: data_gouv_agenda
      chamber: MinEduc
      since_days: 90
      title_prefix: "MinEduc —"

    # R15 (2026-04-22) — Agenda public du ministre de l'Enseignement
    # supérieur, de la Recherche et de l'Innovation. Dataset data.gouv.fr
    # `fr-esr-agenda-ministre` (~4788 entrées, màj théoriquement hebdo).
    # Utilise le connecteur `data_gouv_agenda` qui consomme le JSON
    # iCal-like exposé par OpenDataSoft (portail data.enseignementsup-
    # recherche.gouv.fr). Contournement propre du blocage Cloudflare
    # sur education.gouv.fr.
    #
    # ⚠  Le flux upstream s'est arrêté le 22 octobre 2025 (pas d'event
    # après cette date). Cause probable : changement de ministre ou
    # publication interrompue. La source produit 0 item tant que le
    # flux reprend (visible via l'alerte "0 items sans erreur" du
    # dispatcher). On laisse enabled pour détecter automatiquement la
    # reprise.
    - id: min_esr_agenda
      category: agenda
      url: https://data.enseignementsup-recherche.gouv.fr/api/explore/v2.1/catalog/datasets/fr-esr-agenda-ministre/exports/json
      format: data_gouv_agenda
      chamber: MinESR
      since_days: 90
      title_prefix: "MinESR —"

ministeres:
