# Inventaire des sources — veille parlementaire sport
# Validé en live sur data.assemblee-nationale.fr, data.senat.fr et les portails officiels
# en avril 2026. À auditer régulièrement via scripts/audit_sources.py.

# Catégories Follaw.sv :
#   dossiers_legislatifs | jorf | amendements | questions | comptes_rendus
#   publications        | nominations | agenda | communiques

assemblee_nationale:
  base: https://data.assemblee-nationale.fr/static/openData/repository/17
  sources:
    - id: an_dossiers_legislatifs
      category: dossiers_legislatifs
      url: https://data.assemblee-nationale.fr/static/openData/repository/17/loi/dossiers_legislatifs/Dossiers_Legislatifs.json.zip
      format: json_zip

    - id: an_amendements
      category: amendements
      # Path live AN opendata : /loi/amendements_div_legis/Amendements.json.zip
      # (vérifié 2026-04-20 : HTTP 200, 254 Mo, last-modified du jour —
      #  le path /loi/amendements_legis/Amendements.json.zip renvoie 404,
      #  cause du an_amendements=0 observé depuis R11).
      url: https://data.assemblee-nationale.fr/static/openData/repository/17/loi/amendements_div_legis/Amendements.json.zip
      format: json_zip
      since_days: 30      # fenêtre (sinon 104k amendements rechargés à chaque run)

    - id: an_questions_ecrites
      category: questions
      url: https://data.assemblee-nationale.fr/static/openData/repository/17/questions/questions_ecrites/Questions_ecrites.json.zip
      format: json_zip
      since_days: 30

    - id: an_questions_gouvernement
      category: questions
      url: https://data.assemblee-nationale.fr/static/openData/repository/17/questions/questions_gouvernement/Questions_gouvernement.json.zip
      format: json_zip
      since_days: 30

    - id: an_questions_orales_sans_debat
      category: questions
      url: https://data.assemblee-nationale.fr/static/openData/repository/17/questions/questions_orales_sans_debat/Questions_orales_sans_debat.json.zip
      format: json_zip
      since_days: 30

    - id: an_agenda
      category: agenda
      url: https://data.assemblee-nationale.fr/static/openData/repository/17/vp/reunions/Agenda.json.zip
      format: json_zip
      # R13-L (2026-04-21) : 90j → 30j aligné sur WINDOW_DAYS_BY_CATEGORY
      # agenda (Cyril veut 30 derniers jours + futurs seulement).
      since_days: 30

    # NB : pas de dump "Reunions.json.zip" séparé — la page
    # /reunions/reunions ne pointe que vers Agenda.json.zip, qui couvre
    # déjà toutes les réunions.

    # Syceron brut = comptes rendus intégraux de séance publique.
    # URL récupérée via la page /travaux-parlementaires/debats.
    # ATTENTION : le nom du fichier est "syseron" (avec un S) et pas
    # "syceron" (avec un C) — typo historique dans le nommage AN.
    - id: an_syceron
      category: comptes_rendus
      url: https://data.assemblee-nationale.fr/static/openData/repository/17/vp/syceronbrut/syseron.xml.zip
      format: xml_zip
      since_days: 30

senat:
  sources:
    # ----- Dossiers législatifs : flux Akoma Ntoso (titre + statut + date)
    # depots.xml liste les textes déposés au Sénat (primo-dépôt, transmis,
    # texte de commission) ; adoptions.xml liste les textes adoptés en
    # séance. Chaque entrée pointe vers un .akn.xml unitaire contenant le
    # workflow complet (procédure parlementaire). Doc DSI Sénat (mars 2021).
    - id: senat_akn_depots
      category: dossiers_legislatifs
      url: https://www.senat.fr/akomantoso/depots.xml
      format: akn_index
      since_days: 90       # ne fetch que les textes modifiés < 3 mois

    - id: senat_akn_adoptions
      category: dossiers_legislatifs
      url: https://www.senat.fr/akomantoso/adoptions.xml
      format: akn_index
      since_days: 90

    # ----- Dossiers législatifs : flux CSV legacy (conservés en backup)
    # Le CSV ne fournit pas de date ni de statut de procédure : ces sources
    # complètent le flux AKN sur les dossiers anciens, mais le titre / la
    # date ne sont pas garantis.
    # senat_dosleg : DÉSACTIVÉ en R11g-1 (2026-04-21).
    # Produit 0 item depuis longtemps (le dosleg.zip était déjà vide à
    # l'audit). Remplacé fonctionnellement par `senat_akn` (Akoma Ntoso)
    # qui couvre les dossiers législatifs Sénat avec date + titre fiables.
    # Conservé en config pour mémoire, réactivable si besoin.
    - id: senat_dosleg
      category: dossiers_legislatifs
      url: https://data.senat.fr/data/dosleg/dosleg.zip
      format: csv_zip
      enabled: false

    - id: senat_ppl
      category: dossiers_legislatifs
      url: https://data.senat.fr/data/dosleg/ppl.csv
      format: csv

    - id: senat_rapports
      category: communiques
      url: https://data.senat.fr/data/dosleg/rapports.csv
      format: csv

    - id: senat_promulguees
      category: dossiers_legislatifs
      url: https://data.senat.fr/data/dosleg/promulguees.csv
      format: csv

    # senat_ameli.zip = dump PostgreSQL plain (un seul fichier
    # var/opt/opendata/ameli.sql de 149 Mo), pas un zip de CSV. Le loader
    # csv_zip filtre sur .csv ligne 133 → 0 item systémique depuis des
    # mois. Remplacé par `senat_amendements` ci-dessous qui itère les
    # textes récents et fetche les CSV unitaires `jeu_complet_*.csv`
    # exposés par le Sénat (doc officielle data.senat.fr/ameli/).
    # Conservé en config (enabled: false) pour mémoire.
    - id: senat_ameli
      category: amendements
      url: https://data.senat.fr/data/ameli/ameli.zip
      format: csv_zip
      enabled: false

    # Amendements per-texte : itère depots.xml + adoptions.xml pour
    # récupérer session+num, puis fetche les CSV jeu_complet séance +
    # commission exposés en temps réel. Enrichit chaque amendement avec
    # le titre du dossier parent (logique R11b côté Sénat) pour que le
    # matcher retombe sur le thème même quand l'amendement lui-même ne
    # cite pas les mots-clés littéralement.
    - id: senat_amendements
      category: amendements
      url: https://www.senat.fr/akomantoso/depots.xml
      format: akn_discussion
      since_days: 90

    # senat_questions : DÉSACTIVÉ en R11g-1 (2026-04-21).
    # Produit 0 item depuis longtemps (doublon historique de
    # `senat_questions_1an` qui couvre la fenêtre glissante 1 an sur CSV).
    # Le zip complet questions.zip n'expose plus de CSV exploitable.
    - id: senat_questions
      category: questions
      url: https://data.senat.fr/data/questions/questions.zip
      format: csv_zip
      enabled: false

    - id: senat_qg
      category: questions
      url: https://data.senat.fr/data/questions/qg.csv
      format: csv

    - id: senat_questions_1an
      category: questions
      url: https://data.senat.fr/data/questions/questions-depuis-un-an.csv
      format: csv

    - id: senat_debats
      category: comptes_rendus
      url: https://data.senat.fr/data/debats/debats.zip
      format: csv_zip

    - id: senat_cri
      category: comptes_rendus
      url: https://data.senat.fr/data/debats/cri.zip
      format: csv_zip

    - id: senat_rss
      category: communiques
      url: https://data.senat.fr/feed/actualites-rss.xml
      format: rss

    # R15 (2026-04-22) — scraper dédié agenda Sénat. Remplace l'ancien
    # format `html` qui tombait sur la SPA AngularJS (0 item). Itère la
    # fenêtre J-7 → J+30 et fetche la vue imprimable quotidienne
    # `/agenda/Global/agl{DDMMYYYY}Print.html` qui agrège toutes les
    # sections (1 requête / jour au lieu de 7).
    #
    # R16 (2026-04-22) — DÉSACTIVÉ. Diagnostic confirmé :
    #   - `/agenda/` → HTTP 403 "Accès restreint" (WAF Sénat bloque tous
    #     les UA scrapers, y compris UA Chrome complet).
    #   - `/agenda/Global/aglDDMMYYYYPrint.html` → HTTP 404 "Page
    #     introuvable" (URL inexistante côté serveur, pas juste restreinte).
    #   - Aucun endpoint JSON/iCal agenda public identifié.
    # Réactivation nécessiterait soit un contournement WAF (Playwright +
    # stealth), soit un accord avec la DSI Sénat. Compensation partielle :
    # `senat_theme_sport_rss` (ci-dessous) remonte les textes législatifs
    # / rapports / avis thème "Sports" (non agenda mais même écosystème).
    - id: senat_agenda
      category: agenda
      url: https://www.senat.fr/agenda/
      format: senat_agenda_daily
      before_days: 7
      after_days: 30
      printable: true
      enabled: false

    # R16 (2026-04-22) — Flux RSS Sénat thème "Sports" (N=31).
    # Vérifié live 2026-04-22 : 200 OK, 10 Ko, ~15 entrées (textes n°51
    # "JOP 2030", avis n°144 "Budget 2026 Sport", rapports des commissions
    # thématiques). Compensation au blocage du scraper agenda : on capte
    # au moins les travaux parlementaires Sénat tagués Sport en entrée
    # de catégorie dossiers_legislatifs.
    - id: senat_theme_sport_rss
      category: dossiers_legislatifs
      url: https://www.senat.fr/themes/rss/therss31.xml
      format: rss

# Journal officiel (JORF) — dump DILA OPENDATA (aucun credential nécessaire).
# L'API PISTE/Légifrance est contournée : le dump XML quotidien DILA contient
# les mêmes textes et est accessible sans authentification.
# Doc : https://echanges.dila.gouv.fr/OPENDATA/JORF/
dila:
  sources:
    - id: dila_jorf
      category: jorf
      url: https://echanges.dila.gouv.fr/OPENDATA/JORF/
      format: dila_jorf
      # Nombre d'éditions à ingérer. DILA publie ~2 éditions par jour (matin
      # ~00h30 + soir ~21h), donc 16 ≈ 8 jours de couverture.
      days_back: 16

# Exécutif — flux RSS quand disponibles, sinon scraping structuré
executif:
  sources:
    # R16 (2026-04-22) — L'ancien `elysee_sitemap` utilisait
    # /sitemap.static.xml : 200 OK mais ne contient que 10 URLs de
    # navigation (home, lettre-information, agenda, les-dossiers,
    # recherche, etc.) — aucune publication. Les 5 autres sitemaps
    # (publication, sp, dossier, space, president) exposent 15000+ URLs
    # historiques mais sans `<lastmod>` réel (tous datés 2026-03-18,
    # jour de la refonte) → impossible de filtrer par récence.
    # Solution : flux RSS officiel `/feed` (34 Ko, items récents, vrai
    # pubDate). Limité à ~10 derniers items mais c'est le bon flux
    # canonique pour l'actualité.
    - id: elysee_feed
      category: communiques
      url: https://www.elysee.fr/feed
      format: rss

    # R16 (2026-04-22) — Agenda Élysée. Le scraping HTML générique ne
    # trouvait pas la grille d'événements (0 items R15). Le handler dédié
    # `elysee_agenda_html` connaît la structure : <li class="newsBlock-
    # grid-item"> / <a class="newsBlock-grid-link"> avec date FR en texte
    # et titre dans <span>.
    - id: elysee_agenda
      category: agenda
      url: https://www.elysee.fr/agenda
      format: elysee_agenda_html

    # Matignon + info.gouv.fr : protégés par Cloudflare challenge JS
    # (Cf-Mitigated: challenge, 403 systématique sur httpx, y compris
    # sur `/sitemap.xml` et `/rss/actualites.xml` — vérifié R15,
    # 2026-04-22, cf. audit §1.3). Aucun RSS officiel équivalent
    # identifié. Aucun dataset open data équivalent trouvé sur
    # data.gouv.fr. Sources désactivées tant qu'on n'a pas de
    # contournement (Playwright / stealth / Chrome MCP).
    - id: matignon_actualites
      category: communiques
      url: https://www.gouvernement.fr/actualite
      format: html
      enabled: false

    - id: matignon_agenda
      category: agenda
      url: https://www.gouvernement.fr/agenda
      format: html
      enabled: false

    - id: info_gouv_actualites
      category: communiques
      url: https://www.info.gouv.fr/actualite
      format: html
      enabled: false

    # R15 (2026-04-22) — Agenda public du ministre de l'Éducation
    # nationale. Dataset data.gouv.fr `fr-en-agenda-ministre-education-
    # nationale` via portail OpenDataSoft data.education.gouv.fr.
    # Schéma {uid, dtstart, dtend, description} — PAS de summary ni
    # agenda (le handler `data_gouv_agenda` utilise `description`
    # comme contenu principal en fallback).
    # Vérifié live 2026-04-22 : 126 events 2026, last_modified 2026-04-21.
    # Contournement propre du blocage Cloudflare sur education.gouv.fr.
    - id: min_educ_agenda
      category: agenda
      url: https://data.education.gouv.fr/api/explore/v2.1/catalog/datasets/fr-en-agenda-ministre-education-nationale/exports/json
      format: data_gouv_agenda
      chamber: MinEduc
      since_days: 90
      title_prefix: "MinEduc —"

    # R15 (2026-04-22) — Agenda public du ministre de l'Enseignement
    # supérieur, de la Recherche et de l'Innovation. Dataset data.gouv.fr
    # `fr-esr-agenda-ministre` (~4788 entrées, màj théoriquement hebdo).
    # Utilise le connecteur `data_gouv_agenda` qui consomme le JSON
    # iCal-like exposé par OpenDataSoft (portail data.enseignementsup-
    # recherche.gouv.fr). Contournement propre du blocage Cloudflare
    # sur education.gouv.fr.
    #
    # ⚠  Le flux upstream s'est arrêté le 22 octobre 2025 (pas d'event
    # après cette date). Cause probable : changement de ministre ou
    # publication interrompue. La source produit 0 item tant que le
    # flux reprend (visible via l'alerte "0 items sans erreur" du
    # dispatcher). On laisse enabled pour détecter automatiquement la
    # reprise.
    - id: min_esr_agenda
      category: agenda
      url: https://data.enseignementsup-recherche.gouv.fr/api/explore/v2.1/catalog/datasets/fr-esr-agenda-ministre/exports/json
      format: data_gouv_agenda
      chamber: MinESR
      since_days: 90
      title_prefix: "MinESR —"

ministeres:
  # Scraping des espaces presse / listings actualités (RSS non disponible partout)
  sources:
    - id: min_sports_presse
      category: communiques
      url: https://www.sports.gouv.fr/espace-presse
      format: html
      poids: 3           # priorité maximale (ministère cœur de cible)

    - id: min_sports_actualites
      category: communiques
      url: https://www.sports.gouv.fr/actualites-et-evenements
      format: html
      poids: 3

    # Agenda prévisionnel de la ministre des Sports.
    # URL stable indépendante du titulaire du portefeuille (l'ID slug
    # sports.gouv.fr termine par -1787 et suit le ministre en poste).
    # La page publie des agendas hebdomadaires (PDF) + rendez-vous du
    # jour, scrapés comme listing standard via html_generic.
    # R13-N (2026-04-21) — DÉSACTIVÉ (ancien). La page /organisation/la-ministre/agenda/
    # est la page "biographie" de la ministre (7 liens, aucun événement).
    # Le vrai agenda est publié chaque semaine sur une page au slug
    # changeant (`/agenda-previsionnel-de-<nom-ministre>-<noeud>`).
    # R15 (2026-04-22) : scraper dédié livré — cf. src/sources/min_sports.py.
    # Le handler suit le lien courant depuis la home (URL stable) puis
    # parse les <h5> par jour et les <p> des créneaux (1 item = 1 créneau).
    - id: min_sports_agenda
      category: agenda
      url: https://www.sports.gouv.fr/
      format: min_sports_agenda_hebdo
      chamber: MinSports
      title_prefix: "MinSports —"
      poids: 3

    # Education + Intérieur + Economie : Cloudflare challenge JS (403).
    # À ré-activer si un flux RSS officiel est confirmé ou si on introduit
    # un fallback Playwright pour les sources marquées needs_js.
    - id: min_education
      category: communiques
      url: https://www.education.gouv.fr/presse
      format: html
      enabled: false

    - id: min_interieur
      category: communiques
      url: https://www.interieur.gouv.fr/actualites/presse
      format: html
      enabled: false

    - id: min_economie
      category: communiques
      url: https://www.economie.gouv.fr/espace-presse
      format: html
      enabled: false

    - id: min_justice
      category: communiques
      # R16 (2026-04-22) — Site plus en maintenance (levé entre R15 et
      # R16). /presse redirige 301 → /espace-presse. On tape direct sur
      # l'URL canonique pour éviter le redirect (cause probable du 0
      # items intermittent sur R15). Page réelle : 160 Ko, DSFR-based,
      # listing /actualites/espace-presse/... + liens PDF communiqués.
      url: https://www.justice.gouv.fr/espace-presse
      format: html

    # min_sante + min_travail : DÉSACTIVÉS en R11g-4 (2026-04-21).
    # Le serveur retourne une page "Request Rejected" (WAF/F5 ASM) pour TOUTE
    # requête User-Agent = Mozilla, quel que soit le chemin — vérifié live :
    #   /actualites/presse, /actualites, /, /presse → tous HTTP 200 avec 245 o
    #   d'HTML "Request Rejected". Le scraper parse du HTML vide, d'où 0 items.
    # Réactivation nécessitera soit un navigateur headless (Playwright), soit
    # un flux officiel (RSS ou press-releases.xml) — à rechercher si besoin.
    - id: min_sante
      category: communiques
      url: https://sante.gouv.fr/actualites/presse
      format: html
      enabled: false

    - id: min_travail
      category: communiques
      url: https://travail-emploi.gouv.fr/actualites/presse
      format: html
      enabled: false

    - id: min_culture
      category: communiques
      url: https://www.culture.gouv.fr/Presse
      format: html

    - id: min_affaires_etrangeres
      category: communiques
      # R16 (2026-04-22) : MEAE a refactoré l'arbo de nouveau.
      # /presse-et-ressources/decouvrir-et-informer/actualites/ renvoie
      # un 301 -> /presse/decouvrir-et-s-informer/actualites (scheme https
      # préservé, vérifié curl + httpx). On tape désormais directement sur
      # l'URL canonique pour éviter toute chaîne de redirect susceptible
      # de basculer en http:// côté server (cause probable du 0 items R15).
      # Page réelle : 241 Ko, 12 cartes a.fr-card__link (DSFR), 95 pages
      # de listing d'actualités (~1140 items historiques).
      url: https://www.diplomatie.gouv.fr/fr/presse/decouvrir-et-s-informer/actualites
      format: html

    - id: min_transition_ecologique
      category: communiques
      url: https://www.ecologie.gouv.fr/presse
      format: html

    - id: min_armees
      category: communiques
      url: https://www.defense.gouv.fr/actualites
      format: html

    - id: min_ruralite
      category: communiques
      url: https://www.cohesion-territoires.gouv.fr/presse
      format: html

    - id: min_enseignement_sup
      category: communiques
      # /fr/presse redirige vers /404. Nouveau slug stable : /fr/espace-presse-50621.
      url: https://www.enseignementsup-recherche.gouv.fr/fr/espace-presse-50621
      format: html

autorites:
  sources:
    - id: ans
      category: communiques
      # Agence nationale du Sport. Historique : ConnectTimeout chronique
      # au printemps 2026, mais la DB contient ~43 items ingérés sur plusieurs
      # runs → le host répond par intermittence. Réactivée : le soft-fail
      # du loader (`_common.fetch`) lâche proprement en cas de timeout, les
      # items déjà captés restent visibles jusqu'au prochain run réussi.
      url: https://www.agencedusport.fr/actualites
      format: html
      poids: 3

    # R15 (2026-04-22) — AFLD : passage en RSS officiel (WordPress).
    # La page /actualites/ en HTML ne remontait qu'1 item (le lien de nav
    # "Actualités") — le feed RSS donne 4 articles 2026 récents avec
    # dates ISO + catégorie propre.
    - id: afld
      category: communiques
      url: https://www.afld.fr/feed/
      format: rss

    - id: arcom
      category: communiques
      url: https://www.arcom.fr/actualites
      format: html

    - id: anj
      category: communiques
      # /actualites renvoyait 404. Page officielle confirmée.
      url: https://anj.fr/communiques-de-presse
      format: html

    - id: cour_comptes
      category: communiques
      # ccomptes.fr : ConnectTimeout chronique (3×60s = 3 min perdues par
      # run). À ré-activer après vérification manuelle du host, ou
      # basculement sur un flux RSS officiel si disponible.
      url: https://www.ccomptes.fr/fr/publications
      format: html
      enabled: false

    # R15 (2026-04-22) — Défenseur des droits : passage en RSS officiel.
    # /rss.xml renvoie un flux valide (49 Ko, dates ISO 2026-04 récentes)
    # alors que le scraping HTML capte ~30 items dont beaucoup de nav.
    - id: defenseur_droits
      category: communiques
      url: https://www.defenseurdesdroits.fr/rss.xml
      format: rss

    # R13-M (2026-04-21) — Cyril : ajout des 3 hautes juridictions en
    # publications. RSS officiels confirmés pour CE et CC (QPC360).
    # Cour de cassation : RSS officiel non documenté publiquement —
    # fallback HTML scraping de /toutes-les-actualites.
    - id: conseil_etat
      category: communiques
      url: https://www.conseil-etat.fr/rss/actualites-rss
      format: rss

    - id: conseil_constit_actualites
      category: communiques
      url: https://qpc360.conseil-constitutionnel.fr/rss/actualites
      format: rss

    - id: conseil_constit_decisions
      category: jorf
      url: https://qpc360.conseil-constitutionnel.fr/rss/decisions
      format: rss

    # R15 (2026-04-22) — Cour de cassation : site protégé par anti-bot
    # JavaScript (redirection `window.location.href=/redirect_XXXX/`
    # sur TOUS les endpoints /, /actualites, /rss, /feed, /sitemap.xml).
    # Même technologie que vie-publique.fr — insurmontable en pur HTTP.
    # Pas de dataset data.gouv.fr d'actualités Cour de cassation (seul
    # `Jurisprudence pseudonymisée` existe, mais pas de métadonnées
    # d'actualité/communiqué). Les décisions de principe atterrissent
    # au JORF (capturées par `dila_jorf`), donc la perte est limitée.
    # Réactiver si un flux RSS officiel est annoncé ou via Playwright.
    - id: cour_cassation
      category: communiques
      url: https://www.courdecassation.fr/toutes-les-actualites
      format: html
      enabled: false

    # R13-M (2026-04-21) — réactivation CNOSF via sitemap.xml Drupal.
    # Le site CNOSF est Nuxt (rendu JS côté client pour /actualites), donc
    # html_generic ne voyait aucun lien. Le sitemap XML officiel est
    # statique, contient toutes les URLs d'articles avec <lastmod>. Le
    # nouveau format "sitemap" dans html_generic filtre les URLs qui
    # contiennent "actualit-"/"news-"/"communique" et reconstitue le titre
    # depuis le slug.
    - id: cnosf
      category: communiques
      url: https://cnosf.franceolympique.com/sitemap.xml
      format: sitemap

    - id: france_paralympique
      category: communiques
      url: https://france-paralympique.fr/actualites/
      format: html

