# R43-B (2026-05-17) — Listes manuelles d'appartenance « sport-relevant ».
#
# Critères Cyril :
# - Membre commission Culture (AN ou Sénat) : 5 pts
# - Membre groupe d'étude sport / mission d'information sport / commission
#   d'enquête sport : 5 pts (Sénat. Côté AN les groupes d'études ne
#   sont plus visibles en ligne — on n'insiste pas, focus Sénat)
#
# Sources :
# - https://www.senat.fr/commission/cult/index.html (membres commission
