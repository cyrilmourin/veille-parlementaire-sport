baseURL = "https://veille.sideline-conseil.fr/"
languageCode = "fr-fr"
title = "Veille Institutionnelle Sport — Sideline Conseil"
enableRobotsTXT = true

# Défense en profondeur : ne pas masquer une page dont `date:` tombe dans le
# futur à cause d'un écart de fuseau build/navigateur. Toutes les pages
# veille restent visibles.
buildFuture = true
buildExpired = true

# 50 items par page dans les listings — demande utilisateur (densité).
# Hugo ≥ 0.128 utilise la section [pagination]; les versions antérieures
# lisaient `paginate` top-level. On met les deux pour compatibilité.
# R41-AB (2026-05-09) : bumpé 50 → 100. La plupart des catégories
# tournent autour de 30-90 items en fenêtre courante ; à 50, plusieurs
# (publications avec 57 items, agenda, etc.) déclenchaient une 2ème
# page presque vide. À 100, ces catégories tiennent en 1 seule page
# → pagination automatiquement masquée par le partial pagination-inline
# (guard `if gt $p.TotalPages 1`).
paginate = 100

[pagination]
  pagerSize = 100

[params]
  description = "Veille institutionnelle quotidienne du sport en France : Parlement (AN, Sénat), Gouvernement, JORF, autorités indépendantes, opérateurs publics et mouvement sportif. Sources officielles agrégées et filtrées par Sideline Conseil — actualisée chaque matin."
  author = "Sideline Conseil"
  tagline = "Voir clair. Jouer juste."
  accent = "#122549"
  accent2 = "#DA4431"
  mailto = "cyrilmourin@sideline-conseil.fr"

[markup.goldmark.renderer]
  unsafe = true

[outputs]
  home = ["HTML", "RSS", "JSON"]
  section = ["HTML", "RSS"]

[permalinks]
  items = "/:section/:slug/"
