<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 56 56" width="56" height="56" role="img" aria-label="Sénat">
  <!-- Fond blanc -->
  <rect width="56" height="56" fill="#FFFFFF"/>
  <!-- Bandes rouges haut et bas -->
  <rect x="0" y="1" width="56" height="2" fill="#E1041E"/>
  <rect x="0" y="53" width="56" height="2" fill="#E1041E"/>
  <!-- Bandes bleues gauche et droite -->
  <rect x="1" y="0" width="2" height="56" fill="#0F4A93"/>
  <rect x="53" y="0" width="2" height="56" fill="#0F4A93"/>
  <!-- Arcs concentriques gris (dôme stylisé) -->
  <g fill="none" stroke="#BFBFBF" stroke-width="2.2" stroke-linecap="round">
    <path d="M 10 46 A 18 18 0 0 1 46 46"/>
    <path d="M 14 46 A 14 14 0 0 1 42 46"/>
    <path d="M 18 46 A 10 10 0 0 1 38 46"/>
  </g>
  <!-- Arc bleu (centre haut) -->
  <path d="M 20 38 A 8 8 0 0 1 36 38" fill="none"
        stroke="#0F4A93" stroke-width="2.2" stroke-linecap="round"/>
  <!-- Arc rouge (centre bas) -->
  <path d="M 22 43 A 6 6 0 0 1 34 43" fill="none"
        stroke="#E1041E" stroke-width="2.2" stroke-linecap="round"/>
  <!-- Texte SÉNAT (noir, serif, centré) -->
  <text x="28" y="28" text-anchor="middle" dominant-baseline="middle"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="14" font-weight="700" fill="#000000" letter-spacing="0.5">SÉNAT</text>
</svg>
