  <!-- Texte Sénat -->
  <text x="28" y="32"
        text-anchor="middle"
        dominant-baseline="middle"
        font-family="Montserrat, Arial, sans-serif"
        font-size="14"
        font-weight="900"
        fill="#FFFFFF"
        letter-spacing="1">SÉNAT</text>
</svg>
